name: meureembolso

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reembolso_combustivel}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:12345678@db:5432/reembolso_combustivel?schema=public}
      DIRECT_URL: ${DOCKER_DIRECT_URL:-postgresql://postgres:12345678@db:5432/reembolso_combustivel?schema=public}
      JWT_SECRET: ${DOCKER_JWT_SECRET:-changeme}
      PORT: "3000"
      CORS_ORIGIN: ${DOCKER_CORS_ORIGIN:-http://localhost:8080,http://localhost:5173}
      PRISMA_DB_PUSH: ${DOCKER_PRISMA_DB_PUSH:-true}
      PRISMA_DB_SEED: ${DOCKER_PRISMA_DB_SEED:-false}
      PRISMA_SEED_MODE: ${DOCKER_PRISMA_SEED_MODE:-full}
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${DOCKER_VITE_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
